# Docker Compose minimalista (sin Dockerfiles)
# - Backend: imagen oficial php:8.4-apache que sirve el código montado desde ./packages/backend
# - Frontend: se asume que has ejecutado `npm run build` en ./packages/client y la carpeta dist
#             será montada en Caddy en /srv/frontend para servir los archivos estáticos
# - Caddy: proxy TLS automático, sirve archivos estáticos y enruta /api al backend
# - MariaDB + phpMyAdmin para la base de datos
#
# Flujo esperado:
# 1) En tu máquina local, desde webapp-citas/packages/client: `npm run build`
#    Esto generará ./packages/client/dist
# 2) Levantas docker compose con este fichero: `docker compose up -d --build`
# 3) Caddy servirá el contenido estático desde /srv/frontend y gestionará TLS automáticamente
#
services:
    mariadb:
        image: mariadb:latest
        container_name: mariadb
        environment:
            MARIADB_ROOT_PASSWORD: root_password
            MARIADB_DATABASE: webapp_citas
            MARIADB_USER: user
            MARIADB_PASSWORD: password
        ports:
            - "3306:3306"
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - web

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: phpmyadmin
        environment:
            PMA_HOST: mariadb
            PMA_PORT: 3306
            PMA_USER: user
            PMA_PASSWORD: password
        ports:
            - "8081:80"
        depends_on:
            - mariadb
        networks:
            - web

    backend:
        build:
            context: ./packages/backend
            dockerfile: Dockerfile
        container_name: webapp_backend
        restart: unless-stopped
        volumes:
            - ./packages/backend:/var/www/html:rw
        environment:
            DB_HOST: mariadb
            DB_DATABASE: webapp_citas
            DB_USERNAME: user
            DB_PASSWORD: password
        command: sh -c "if [ -d /var/www/html/public ]; then sed -i 's#/var/www/html#/var/www/html/public#g' /etc/apache2/sites-available/000-default.conf; fi && sed -i 's/AllowOverride None/AllowOverride All/g' /etc/apache2/apache2.conf || true && a2enmod rewrite headers || true && apache2-foreground"
        depends_on:
            - mariadb
        networks:
            - web

            # No publicamos puertos del backend. Caddy hará reverse_proxy internamente.

    caddy:
        image: caddy:2.7.3
        container_name: webapp_caddy
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        depends_on:
            - backend
        volumes:
            # Persistencia Caddy (ACME, etc.)
            - caddy_data:/data
            - caddy_config:/config
            # Montamos los archivos estáticos del frontend (debes haber hecho build localmente)
            - ./packages/client/dist:/srv/frontend:ro
            # Monta tu Caddyfile (ajusta dominio dentro de caddy/Caddyfile)
            - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
        networks:
            - web

volumes:
    db_data:
    caddy_data:
    caddy_config:

networks:
    web:
        driver: bridge
